site_name: Kando
site_description: Production runtime for long-running agents — the event log is the agent
site_url: https://kando.ucalyptus.me
repo_url: https://github.com/ucalyptus/kando
repo_name: ucalyptus/kando
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/logo.png
  palette:
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - toc.follow

extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_symbol_type_heading: true
            merge_init_into_class: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - footnotes
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ucalyptus/kando

nav:
  - Home: index.md
  - Concepts: concepts.md
  - Quickstart: quickstart.md
  - Architecture: architecture.md
  - CLI Reference: cli.md
  - MCP Server: mcp.md
  - Kits:
      - Overview: kits/index.md
      - Diligence Kit: kits/diligence.md
      - Research Kit: kits/research.md
      - Writing a Kit: kits/authoring.md
  - API Reference:
      - Overview: api/index.md
      - Runtime: api/runtime.md
      - Ledger: api/ledger.md
      - World & Projection: api/world.md
      - Budget: api/budget.md
      - Delivery Bus: api/delivery.md
      - LLM Cache: api/cache.md
      - Trace & Lineage: api/trace.md
      - Branch & Diff: api/branch.md
      - LLM Executor: api/llm_executor.md
  - Contributing: contributing.md
  - ADRs:
      - Overview: adr/index.md
      - ADR-001 Event Log as Source of Truth: adr/ADR-001-event-log-as-source-of-truth.md
      - ADR-002 Responder Pattern: adr/ADR-002-responder-pattern.md
      - ADR-003 World as Deterministic Projection: adr/ADR-003-world-as-deterministic-projection.md
      - ADR-004 Budget Enforcement at Runtime: adr/ADR-004-budget-enforcement-at-runtime.md
      - ADR-005 Intention–Effect Split: adr/ADR-005-intention-effect-split.md
      - ADR-006 Object Patched Shallow Merge: adr/ADR-006-object-patched-shallow-merge.md
      - ADR-007 LLM Executor as Pluggable Factory: adr/ADR-007-llm-executor-as-pluggable-factory.md
      - ADR-008 UUID-Based Event IDs: adr/ADR-008-uuid-based-event-ids.md
      - ADR-009 LLM Cache via World Context: adr/ADR-009-llm-cache-via-world-context.md
      - ADR-010 Branch Fork via Prefix Cache: adr/ADR-010-branch-fork-via-prefix-cache.md
      - ADR-011 Synchronous Runtime Loop: adr/ADR-011-synchronous-runtime-loop.md
      - ADR-012 Hash-Verified Replay: adr/ADR-012-hash-verified-replay.md
      - ADR-013 Schema Boundary Contracts: adr/ADR-013-schema-boundary-contracts.md
      - ADR-014 Multi-Agent Concurrency: adr/ADR-014-multi-agent-concurrency.md
      - ADR-015 Edge Logic Registry: adr/ADR-015-edge-logic-registry.md
