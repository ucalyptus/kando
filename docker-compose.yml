services:
  eventstore:
    image: eventstore/eventstore:lts
    ports:
      - "2113:2113"   # HTTP API + UI
      - "1113:1113"   # TCP (legacy)
    environment:
      - EVENTSTORE_CLUSTER_SIZE=1
      - EVENTSTORE_RUN_PROJECTIONS=All
      - EVENTSTORE_START_STANDARD_PROJECTIONS=true
      - EVENTSTORE_DEV=true
    volumes:
      - eventstore-data:/var/lib/eventstore

  kando:
    build: .
    command: ["python", "-m", "kando.cli.main", "status", "demo"]
    depends_on:
      - eventstore
    environment:
      - EVENTSTORE_URL=http://eventstore:2113
    volumes:
      - .:/app
    working_dir: /app

volumes:
  eventstore-data:
